<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="index.css" />
    <script src="renderer.js" defer></script>
    <script src="../src/scripts/main.js" defer></script>

    <title>ChroniX</title>
  </head>
  <body>
    <div class="grid-container">
      <div class="custom-titlebar">
        <img src="../assets/images/ChroniX_neu_w_2.png" alt="Chronix Logo" />
      </div>

      <div class="menu-left">
        <div class="tracking-header">
          <label class="toggle">
            <input type="checkbox" id="tracking" />
            <span class="track"><span class="knob"></span></span>
          </label>
          <div class="tracking-info">
            <span class="tracking-label">Tracking</span>
            <span class="tracking-status" id="trackingStatus">Pausiert</span>
          </div>
        </div>

        <ul>
          <li>
            <button type="button" data-tab="times">Zeiten</button>
          </li>
          <li>
            <button type="button" data-tab="whitelist">Whitelist</button>
          </li>
          <li>
            <button type="button" data-tab="server">Serververbindung</button>
          </li>
          <li>
            <button type="button" data-tab="login">Login/Token</button>
          </li>
        </ul>
      </div>

      <div class="settings-container">
        <h2 id="sectionTitle">Zeiten</h2>

        <section id="section-times" class="tab-content active">
          <ul id="timesList" class="times-list"></ul>
          <p id="timesEmpty" class="empty-state">
            Noch keine Zeiten getrackt. Füge Prozesse zur Whitelist hinzu und
            starte das Tracking.
          </p>
          <button type="button" id="refreshTimesBtn" class="primary-btn">
            Aktualisieren
          </button>
        </section>

        <section id="section-whitelist" class="tab-content">
          <ul id="whitelistList"></ul>
          <label for="processDropdown"
            >Wähle einen Prozess zum Tracken aus:</label
          >
          <div class="processFlex">
            <select name="processes" id="processDropdown">
              <option value="">--Wähle einen Prozess aus--</option>
            </select>
            <button type="button" id="addProcessBtn" class="primary-btn">
              Hinzufügen
            </button>
          </div>
        </section>

        <section id="section-server" class="tab-content">
          <p>Status der Serververbindung:</p>
          <div id="serverStatus" class="server-status">Wird geprüft...</div>
          <button type="button" id="checkStatusBtn" class="primary-btn">
            Erneut prüfen
          </button>
        </section>

        <section id="section-login" class="tab-content">
          <p>Login / Token-Verwaltung folgt.</p>
        </section>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </body>
</html>
